name: Deploy with API Key
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 -c "
import os
key = os.environ['ANTHROPIC_API_KEY']
with open('index.html', 'r') as f:
    html = f.read()
html = html.replace('__ANTHROPIC_KEY__', key)
with open('index.html', 'w') as f:
    f.write(html)
replaced = '__ANTHROPIC_KEY__' not in html
print('Key injected:', replaced)
print('Key starts with:', key[:10] if key else 'EMPTY')
"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
